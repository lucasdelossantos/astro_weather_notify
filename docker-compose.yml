services:
  astro-notify:
    build: .
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - LATITUDE=${LATITUDE}
      - LONGITUDE=${LONGITUDE}
      - ELEVATION=${ELEVATION}
      - TIMEZONE=${TIMEZONE}
      - LOCATION_NAME=${LOCATION_NAME}
      - TOMORROW_API_KEY=${TOMORROW_API_KEY}
      - NOTIFY_THRESHOLD=${NOTIFY_THRESHOLD:-6.0}
      - PROFILE_PATH=/app/profile.json
      - TZ=${TIMEZONE}
    volumes:
      - ./profile.json:/app/profile.json:ro
    restart: unless-stopped
